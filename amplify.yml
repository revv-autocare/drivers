version: 1
applications:
  # ── Driver PWA — also deploys the shared Amplify Gen 2 backend ──
  # Backend lives at apps/driver/amplify/. Commands run from appRoot
  # (apps/driver) — using `pnpm -C ../..` instead of `cd ../..` so CWD
  # stays at appRoot and ampx finds ./amplify/backend.ts directly.
  - appRoot: apps/driver
    backend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9 @aws-amplify/backend-cli@1
            - pnpm -C ../.. install --no-frozen-lockfile
        build:
          commands:
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - pnpm -C ../.. install --no-frozen-lockfile
        build:
          commands:
            - pnpm -C ../.. --filter driver build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../.pnpm-store/**/*

  # ── Shop (Phase 2) ──
  - appRoot: apps/shop
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - pnpm -C ../.. install --no-frozen-lockfile
        build:
          commands:
            - pnpm -C ../.. --filter shop build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../.pnpm-store/**/*

  # ── Admin (Phase 3) ──
  - appRoot: apps/admin
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - pnpm -C ../.. install --no-frozen-lockfile
        build:
          commands:
            - pnpm -C ../.. --filter admin build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../.pnpm-store/**/*
