version: 1
applications:
  # ── Driver PWA — also deploys the shared Amplify Gen 2 backend ──
  - appRoot: apps/driver
    backend:
      phases:
        preBuild:
          commands:
            # --force overrides the Gen 1 `amplify` binary pre-installed in the
            # Amplify build container. --no-frozen-lockfile because we don't
            # commit pnpm-lock.yaml yet (first build generates it).
            - npm install -g --force pnpm@9 @aws-amplify/backend-cli@1
            - cd ../.. && pnpm install --no-frozen-lockfile
        build:
          commands:
            - cd ../.. && ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - cd ../.. && pnpm install --no-frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter driver build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../.pnpm-store/**/*

  # ── Shop (Phase 2) ──
  - appRoot: apps/shop
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - cd ../.. && pnpm install --no-frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter shop build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../.pnpm-store/**/*

  # ── Admin (Phase 3) ──
  - appRoot: apps/admin
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - cd ../.. && pnpm install --no-frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter admin build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../.pnpm-store/**/*
