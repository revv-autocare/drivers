version: 1
applications:
  # ── Driver PWA — also deploys the shared Amplify Gen 2 backend ──
  - appRoot: apps/driver
    buildPath: /
    backend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9 @aws-amplify/backend-cli@1
            - pnpm install --no-frozen-lockfile
        build:
          commands:
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - pnpm install --no-frozen-lockfile
        build:
          commands:
            - pnpm --filter driver build
      artifacts:
        baseDirectory: apps/driver/dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .pnpm-store/**/*

  # ── Shop (Phase 2) ──
  - appRoot: apps/shop
    buildPath: /
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - pnpm install --no-frozen-lockfile
        build:
          commands:
            - pnpm --filter shop build
      artifacts:
        baseDirectory: apps/shop/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .pnpm-store/**/*

  # ── Admin (Phase 3) ──
  - appRoot: apps/admin
    buildPath: /
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - pnpm install --no-frozen-lockfile
        build:
          commands:
            - pnpm --filter admin build
      artifacts:
        baseDirectory: apps/admin/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .pnpm-store/**/*
