version: 1
applications:
  # ── Driver PWA — also deploys the shared Amplify Gen 2 backend ──
  # Backend now lives at apps/driver/amplify/ per Gen 2 monorepo convention,
  # so npx ampx finds it directly without any cd or buildPath gymnastics.
  - appRoot: apps/driver
    backend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - cd ../.. && pnpm install --no-frozen-lockfile
        build:
          commands:
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - cd ../.. && pnpm install --no-frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter driver build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../.pnpm-store/**/*

  # ── Shop (Phase 2) ──
  - appRoot: apps/shop
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - cd ../.. && pnpm install --no-frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter shop build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../.pnpm-store/**/*

  # ── Admin (Phase 3) ──
  - appRoot: apps/admin
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g --force pnpm@9
            - cd ../.. && pnpm install --no-frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter admin build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../.pnpm-store/**/*
