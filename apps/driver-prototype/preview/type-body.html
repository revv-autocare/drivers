<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Body & UI</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="display:grid; grid-template-columns: 1fr 1fr; gap:24px;">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:12px;">
      <span style="font-size:20px; line-height:30px; font-weight:500;">Body xl · 20/30</span>
      <span style="font-size:11px; color:var(--fg-secondary)">paragraphs</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:12px;">
      <span style="font-size:18px; line-height:28px; font-weight:500;">Body lg · 18/28</span>
      <span style="font-size:11px; color:var(--fg-secondary)">lead</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:12px;">
      <span style="font-size:16px; line-height:24px; font-weight:400;">Body md · 16/24 — default</span>
      <span style="font-size:11px; color:var(--fg-secondary)">default</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:12px;">
      <span style="font-size:14px; line-height:20px; font-weight:500;">Body sm · 14/20</span>
      <span style="font-size:11px; color:var(--fg-secondary)">UI labels</span>
    </div>
    <div style="display:flex; align-items:baseline; gap:12px;">
      <span style="font-size:12px; line-height:18px; font-weight:400;">Body xs · 12/18</span>
      <span style="font-size:11px; color:var(--fg-secondary)">helper</span>
    </div>
  </div>
  <div style="display:flex; flex-direction:column; gap:14px; border-left:1px solid var(--border-subtle); padding-left:24px;">
    <div style="font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--fg-secondary)">EYEBROW · 12 · 600 · UPPERCASE</div>
    <div style="font-size:14px; font-weight:500; color:var(--fg-primary)">Form label · 14 · 500</div>
    <div style="font-size:14px; font-weight:400; color:var(--fg-secondary)">Helper text · 14 · 400 · secondary</div>
    <div style="font-size:14px; font-weight:600; color:var(--color-brand-500)">Link / action · 14 · 600 · brand</div>
    <div style="font-family:var(--font-mono); font-size:13px; background:var(--color-neutral-50); padding:6px 10px; border-radius:6px; display:inline-block; width:max-content;">monospace · #0065 · ₦32,000.00</div>
  </div>
</div>
</body></html>
