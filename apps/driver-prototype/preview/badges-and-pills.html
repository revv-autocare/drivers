<!doctype html>
<html><head><meta charset="utf-8"><title>Badges & Pills</title>
<link rel="stylesheet" href="_card.css">
<style>
  .pill { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:6px; font-size:12px; font-weight:500; }
  .pill--default { background:var(--color-neutral-100); color:var(--color-neutral-700); }
  .pill--brand { background:var(--color-brand-50); color:var(--color-brand-700); }
  .pill--success { background:var(--color-success-50); color:var(--color-success-700); }
  .pill--error { background:var(--color-error-50); color:var(--color-error-700); }
  .pill--warning { background:var(--color-warning-50); color:var(--color-warning-700); }
  .pill .dot { width:6px; height:6px; border-radius:50%; }
  .count { font-size:12px; font-weight:500; padding:2px 8px; border-radius:5px; background:var(--color-brand-50); color:var(--color-brand-700); }
</style>
</head>
<body>
<div class="card" style="display:flex; flex-direction:column; gap:14px;">
  <div>
    <div class="h-eyebrow" style="margin-bottom:8px;">STATUS PILLS</div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <span class="pill pill--brand">Awaiting authorization</span>
      <span class="pill pill--warning">Requires authorization</span>
      <span class="pill pill--success">Paid</span>
      <span class="pill pill--default">No payment recorded</span>
      <span class="pill pill--error">Declined</span>
    </div>
  </div>
  <div>
    <div class="h-eyebrow" style="margin-bottom:8px;">DOT BADGES &amp; COUNTS</div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
      <span class="pill pill--success"><span class="dot" style="background:var(--color-success-500)"></span>Active</span>
      <span class="pill pill--error"><span class="dot" style="background:var(--color-error-500)"></span>Overdue</span>
      <span class="pill pill--default"><span class="dot" style="background:var(--color-neutral-400)"></span>Draft</span>
      <span style="font-size:13px; color:var(--fg-primary)">Estimate</span>
      <span class="count">10</span>
      <span style="font-size:13px; color:var(--fg-primary); margin-left:6px;">Completed</span>
      <span class="count" style="background:var(--color-success-50); color:var(--color-success-700)">7</span>
    </div>
  </div>
</div>
</body></html>
