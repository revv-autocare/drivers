<!doctype html>
<html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="display:grid; grid-template-columns: 1fr 1fr; gap:0;">
  <div style="background:#fff; padding:24px; display:flex; align-items:center; justify-content:center;">
    <img src="../assets/brand/logo-revv.svg" alt="revv logo" style="height:34px;"/>

  <div style="background:var(--color-brand-500); padding:24px; display:flex; align-items:center; justify-content:center; border-radius:8px;">

  </div>
</div>
</body></html>
