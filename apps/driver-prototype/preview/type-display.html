<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:flex; align-items:flex-end; gap:24px;">
    <div style="font-family:var(--font-sans); font-weight:700; font-size:80px; line-height:1; letter-spacing:-0.03em; color:var(--fg-primary)">Aa</div>
    <div style="display:flex; flex-direction:column; gap:6px; padding-bottom:8px;">
      <div style="font-weight:700; font-size:18px; letter-spacing:-0.01em;">DM Sans</div>
      <div style="font-size:12px; color:var(--fg-secondary)">Display family · weights 400 / 500 / 600 / 700</div>
    </div>
    <div style="margin-left:auto; display:flex; flex-direction:column; gap:14px; padding-bottom:6px;">
      <div style="display:flex; align-items:baseline; gap:14px;">
        <div style="font-size:34px; font-weight:700; letter-spacing:-0.02em; line-height:1;">Display 2xl · 64</div>
        <span style="font-size:11px; color:var(--fg-secondary)">700 / -2%</span>
      </div>
      <div style="display:flex; align-items:baseline; gap:14px;">
        <div style="font-size:26px; font-weight:700; letter-spacing:-0.02em; line-height:1;">Display lg · 48</div>
        <span style="font-size:11px; color:var(--fg-secondary)">700 / -2%</span>
      </div>
      <div style="display:flex; align-items:baseline; gap:14px;">
        <div style="font-size:20px; font-weight:600; letter-spacing:-0.02em; line-height:1;">Display sm · 30</div>
        <span style="font-size:11px; color:var(--fg-secondary)">600 / -2%</span>
      </div>
    </div>
  </div>
</div>
</body></html>
