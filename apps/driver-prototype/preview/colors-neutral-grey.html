<!doctype html>
<html><head><meta charset="utf-8"><title>Neutral & Grey scales</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="font-size:13px; font-weight:600; margin-bottom:4px;">Neutral · cool slate</div>
  <div style="font-size:12px; color:var(--fg-secondary); margin-bottom:10px;">Text, borders, surfaces. Default fg / bg system.</div>
  <div style="display:grid; grid-template-columns: repeat(11, 1fr); gap:6px; margin-bottom:18px;">
    <div><div style="background:#FBFCFD; height:34px; border-radius:6px; border:1px solid rgba(0,0,0,.06);"></div><div class="label"><span class="name">25</span></div></div>
    <div><div style="background:#F4F7FA; height:34px; border-radius:6px;"></div><div class="label"><span class="name">50</span></div></div>
    <div><div style="background:#E6ECF2; height:34px; border-radius:6px;"></div><div class="label"><span class="name">100</span></div></div>
    <div><div style="background:#CDD6E0; height:34px; border-radius:6px;"></div><div class="label"><span class="name">200</span></div></div>
    <div><div style="background:#A8B4C2; height:34px; border-radius:6px;"></div><div class="label"><span class="name">300</span></div></div>
    <div><div style="background:#7B8794; height:34px; border-radius:6px;"></div><div class="label"><span class="name">400</span></div></div>
    <div><div style="background:#525F6D; height:34px; border-radius:6px;"></div><div class="label"><span class="name">500</span></div></div>
    <div><div style="background:#3A4757; height:34px; border-radius:6px;"></div><div class="label"><span class="name">600</span></div></div>
    <div><div style="background:#283344; height:34px; border-radius:6px;"></div><div class="label"><span class="name">700</span></div></div>
    <div><div style="background:#1A2333; height:34px; border-radius:6px;"></div><div class="label"><span class="name">800</span></div></div>
    <div><div style="background:#0F1626; height:34px; border-radius:6px;"></div><div class="label"><span class="name">900</span></div></div>
  </div>

  <div style="font-size:13px; font-weight:600; margin-bottom:4px;">Grey · warm</div>
  <div style="font-size:12px; color:var(--fg-secondary); margin-bottom:10px;">Disabled states, dividers, secondary outlines.</div>
  <div style="display:grid; grid-template-columns: repeat(11, 1fr); gap:6px;">
    <div><div style="background:#FCFCFD; height:30px; border-radius:6px; border:1px solid rgba(0,0,0,.06);"></div><div class="label"><span class="name">25</span></div></div>
    <div><div style="background:#F7F7F8; height:30px; border-radius:6px;"></div><div class="label"><span class="name">50</span></div></div>
    <div><div style="background:#EEEEF0; height:30px; border-radius:6px;"></div><div class="label"><span class="name">100</span></div></div>
    <div><div style="background:#D8D8DC; height:30px; border-radius:6px;"></div><div class="label"><span class="name">200</span></div></div>
    <div><div style="background:#B5B5BC; height:30px; border-radius:6px;"></div><div class="label"><span class="name">300</span></div></div>
    <div><div style="background:#8B8B92; height:30px; border-radius:6px;"></div><div class="label"><span class="name">400</span></div></div>
    <div><div style="background:#65656C; height:30px; border-radius:6px;"></div><div class="label"><span class="name">500</span></div></div>
    <div><div style="background:#4B4B51; height:30px; border-radius:6px;"></div><div class="label"><span class="name">600</span></div></div>
    <div><div style="background:#353539; height:30px; border-radius:6px;"></div><div class="label"><span class="name">700</span></div></div>
    <div><div style="background:#232326; height:30px; border-radius:6px;"></div><div class="label"><span class="name">800</span></div></div>
    <div><div style="background:#161617; height:30px; border-radius:6px;"></div><div class="label"><span class="name">900</span></div></div>
  </div>
</div>
</body></html>
