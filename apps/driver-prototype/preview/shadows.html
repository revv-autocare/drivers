<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="font-size:13px; font-weight:600; margin-bottom:14px;">Elevation · cool shadows</div>
  <div style="display:flex; gap:18px; flex-wrap:wrap;">
    <div style="text-align:center;"><div style="width:88px; height:64px; background:#fff; border-radius:8px; box-shadow:0 1px 2px 0 rgba(16,24,40,.05);"></div><div style="font-size:10px; color:var(--fg-secondary); margin-top:8px;">xs</div></div>
    <div style="text-align:center;"><div style="width:88px; height:64px; background:#fff; border-radius:8px; box-shadow:0 1px 3px 0 rgba(16,24,40,.08), 0 1px 2px -1px rgba(16,24,40,.06);"></div><div style="font-size:10px; color:var(--fg-secondary); margin-top:8px;">sm ★ default card</div></div>
    <div style="text-align:center;"><div style="width:88px; height:64px; background:#fff; border-radius:8px; box-shadow:0 4px 8px -2px rgba(16,24,40,.10), 0 2px 4px -2px rgba(16,24,40,.06);"></div><div style="font-size:10px; color:var(--fg-secondary); margin-top:8px;">md · popover</div></div>
    <div style="text-align:center;"><div style="width:88px; height:64px; background:#fff; border-radius:8px; box-shadow:0 12px 16px -4px rgba(16,24,40,.08), 0 4px 6px -2px rgba(16,24,40,.03);"></div><div style="font-size:10px; color:var(--fg-secondary); margin-top:8px;">lg · menu</div></div>
    <div style="text-align:center;"><div style="width:88px; height:64px; background:#fff; border-radius:8px; box-shadow:0 20px 24px -4px rgba(16,24,40,.08), 0 8px 8px -4px rgba(16,24,40,.03);"></div><div style="font-size:10px; color:var(--fg-secondary); margin-top:8px;">xl · modal</div></div>
    <div style="text-align:center;"><div style="width:88px; height:64px; background:#fff; border-radius:8px; box-shadow:0 0 0 4px rgba(55,119,255,.18); border:1px solid var(--color-brand-500);"></div><div style="font-size:10px; color:var(--fg-secondary); margin-top:8px;">focus ring</div></div>
  </div>
</div>
</body></html>
