<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Revv Shop · Workbay</title>
<link rel="stylesheet" href="shop.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [view, setView] = useState('workbay');
  const [toast, setToast] = useState(null);
  const [orders, setOrders] = useState(window.SEED_ORDERS);

  const addOrder = (col) => {
    const id = '#' + String(70 + orders.length).padStart(4, '0');
    setOrders([...orders, { id, status: col, vehicle: '2021 Hyundai Elantra', services: 'Tire rotation, Brake inspection', extra: 0, assignees:['DT'], date: '12th June, 2022', price: '₦14,000.00', pills: ['Awaiting authorization'] }]);
    setToast('Work order ' + id + ' created');
    setTimeout(() => setToast(null), 2500);
  };

  return (
    <div style={{display:'flex', minHeight:'100vh'}}>
      <Sidebar view={view} setView={setView}/>
      <div className="rv-main">
        <Topbar title={view === 'workbay' ? 'Workbay' : view === 'customers' ? 'Customers' : view === 'settings' ? 'Settings' : 'Dashboard'}/>
        <div className="rv-page">
          {view === 'workbay' && <Workbay orders={orders} addOrder={addOrder}/>}
          {view === 'customers' && <Customers/>}
          {view === 'settings' && <Settings setToast={(t)=>{ setToast(t); setTimeout(()=>setToast(null),2500); }}/>}
          {view === 'dashboard' && <Dashboard/>}
        </div>
      </div>
      {toast && <Toast message={toast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
