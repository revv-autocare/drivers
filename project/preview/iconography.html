<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns: repeat(12, 1fr); gap:14px; }
  .grid img { width:22px; height:22px; opacity:.85; }
  .icell { display:flex; align-items:center; justify-content:center; aspect-ratio:1/1; border:1px solid var(--border-subtle); border-radius:6px; }
