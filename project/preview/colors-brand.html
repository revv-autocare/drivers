<!doctype html>
<html><head><meta charset="utf-8"><title>Brand color scale</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="font-size:13px; font-weight:600; color:var(--fg-primary); margin-bottom:4px;">Brand · Blue</div>
  <div style="font-size:12px; color:var(--fg-secondary); margin-bottom:14px;">Primary brand. <code style="font-family:var(--font-mono); background:var(--color-neutral-50); padding:1px 5px; border-radius:4px;">brand-500 / #3777FF</code> for CTAs, links, focus, "Estimate" status.</div>
  <div style="display:grid; grid-template-columns: repeat(11, 1fr); gap:6px;">
    <!-- 25 50 100 200 300 400 500 600 700 800 900 -->
    <div><div style="background:#F5F8FF; height:48px; border-radius:6px; border:1px solid rgba(0,0,0,.06);"></div><div class="label"><span class="name">25</span>F5F8FF</div></div>
    <div><div style="background:#EAF1FF; height:48px; border-radius:6px;"></div><div class="label"><span class="name">50</span>EAF1FF</div></div>
    <div><div style="background:#D2E0FF; height:48px; border-radius:6px;"></div><div class="label"><span class="name">100</span>D2E0FF</div></div>
    <div><div style="background:#A8C2FF; height:48px; border-radius:6px;"></div><div class="label"><span class="name">200</span>A8C2FF</div></div>
    <div><div style="background:#7CA1FF; height:48px; border-radius:6px;"></div><div class="label"><span class="name">300</span>7CA1FF</div></div>
    <div><div style="background:#5489FF; height:48px; border-radius:6px;"></div><div class="label"><span class="name">400</span>5489FF</div></div>
    <div><div style="background:#3777FF; height:48px; border-radius:6px; box-shadow:0 0 0 2px rgba(55,119,255,.25);"></div><div class="label"><span class="name" style="color:var(--color-brand-600)">500★</span>3777FF</div></div>
    <div><div style="background:#2C5FD9; height:48px; border-radius:6px;"></div><div class="label"><span class="name">600</span>2C5FD9</div></div>
    <div><div style="background:#1E47A6; height:48px; border-radius:6px;"></div><div class="label"><span class="name">700</span>1E47A6</div></div>
    <div><div style="background:#142E70; height:48px; border-radius:6px;"></div><div class="label"><span class="name">800</span>142E70</div></div>
    <div><div style="background:#0A1A3F; height:48px; border-radius:6px;"></div><div class="label"><span class="name">900</span>0A1A3F</div></div>
  </div>
</div>
</body></html>
